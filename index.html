<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRUE INVEST CRM</title>
    
    <link rel="apple-touch-icon" sizes="180x180" href="YOUR_DIRECT_ICON_URL_HERE">
    <link rel="icon" type="image/png" sizes="32x32" href="YOUR_DIRECT_ICON_URL_HERE">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <style>
        :root {
            --bg-color: #f0f2f5; --card-bg: #ffffff; --text-color: #1c1e21; --border-color: #dddfe2;
            --accent-blue: #1877f2; --whatsapp-green: #25D366; --notify-red: #fa3e3e; --highlight-today: #fff9c4;
        }
        body.dark-mode {
            --bg-color: #18191a; --card-bg: #242526; --text-color: #e4e6eb; --border-color: #3e4042; --highlight-today: #4d4600;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-color); color: var(--text-color); margin: 0; 
            padding-bottom: env(safe-area-inset-bottom, 100px); transition: 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        .container { width: 100%; max-width: 500px; margin: auto; padding: 12px; box-sizing: border-box; }
        
        h1 { text-align: center; font-size: 1.4rem; font-weight: 700; margin: 15px 0; }
        .notification-bar { 
            background: var(--notify-red); color: white; padding: 14px; 
            text-align: center; border-radius: 10px; margin-bottom: 12px; 
            display: none; font-size: 14px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        }

        form, .table-container { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        
        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 4px; text-transform: uppercase; opacity: 0.7; }
        input, textarea, button, select { 
            padding: 12px; margin: 6px 0 12px 0; width: 100%; border: 1px solid var(--border-color); 
            border-radius: 8px; background: var(--card-bg); color: var(--text-color); font-size: 16px; 
            box-sizing: border-box; appearance: none; -webkit-appearance: none;
        }
        
        .check-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .check-item { 
            display: flex; align-items: center; gap: 8px; background: var(--bg-color); 
            padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border-color);
        }
        .check-item input[type="checkbox"] { width: 20px; height: 20px; margin: 0; -webkit-appearance: checkbox; }
        .check-item label { margin: 0; font-size: 14px; font-weight: 600; cursor: pointer; }

        button { cursor: pointer; background: var(--accent-blue); color: #fff; border: none; font-weight: bold; height: 50px; border-radius: 10px; font-size: 16px; }
        .btn-secondary { background: #606770; height: 44px; font-size: 14px; margin-top: 0; }
        
        .btn-wa { background: var(--whatsapp-green) !important; width: 44px !important; display: flex; align-items: center; justify-content: center; }
        .btn-edit { background: #ffc107 !important; color: #000 !important; width: 50px !important; }
        .btn-del { background: #fa3e3e !important; width: 50px !important; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .search-box { grid-column: span 2; border: 2px solid var(--accent-blue); padding: 14px; }

        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-color); text-align: center; font-size: 14px; }
        th { background: var(--bg-color); position: sticky; top: 0; z-index: 10; font-weight: 700; }
        
        .row-highlight { background-color: var(--highlight-today) !important; font-weight: 600; }
        .section-divider { background: #606770 !important; color: white; font-size: 11px; text-align: left; padding: 10px 15px; font-weight: bold; }
        .visit-tick { color: #28a745; font-weight: bold; font-size: 18px; }

        .fab { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--accent-blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 100; text-decoration: none; }
        #csvImport { display: none; }
    </style>
</head>
<body>

<div class="container">
    <a href="#clientForm" class="fab">+</a>
    <h1>TRUE INVEST CRM</h1>
    <div id="reminderAlert" class="notification-bar"></div>

    <form id="clientForm">
        <input type="hidden" id="editIndex" value="">
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>Lead Date</label><input type="date" id="leadDate"></div>
            <div><label>Follow-up Date</label><input type="date" id="followup"></div>
        </div>

        <label>Primary Info</label>
        <input type="text" id="name" placeholder="Client Name" required>
        <input type="tel" id="phone" placeholder="Phone Number" required>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <input type="text" id="location" placeholder="Location">
            <input type="text" id="propertyType" placeholder="Property Type">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>Status</label>
                <select id="status">
                    <option>New</option>
                    <option>Follow-up</option>
                    <option>Hot</option>
                    <option>Closed</option>
                    <option>Not Interested</option>
                </select>
            </div>
            <div>
                <label>Site Visit</label>
                <div class="check-item" style="height: 48px; justify-content: center; margin: 6px 0 12px 0;">
                    <input type="checkbox" id="visitDone">
                    <label for="visitDone">Done</label>
                </div>
            </div>
        </div>

        <label>Lead Assignment</label>
        <div class="check-group">
            <div class="check-item">
                <input type="checkbox" id="sendSunny">
                <label for="sendSunny">Send to Sunny</label>
            </div>
        </div>

        <input type="text" id="budget" placeholder="Budget (e.g., 50L - 1Cr)">
        <textarea id="remark" placeholder="Detailed Remarks"></textarea>
        
        <button type="submit" id="saveBtn">Save Record</button>
        <button type="button" class="btn-secondary" onclick="resetForm()">Cancel / Clear</button>
    </form>

    <div class="controls">
        <button class="btn-secondary" onclick="toggleDarkMode()">UI Theme</button>
        <button class="btn-secondary" style="background:#28a745" onclick="downloadExcel()">Export CSV</button>
        <button class="btn-secondary" style="background:#17a2b8" onclick="document.getElementById('csvImport').click()">Import CSV</button>
        <input type="file" id="csvImport" accept=".csv" onchange="importCSV(event)">
        <button class="btn-secondary" style="background:#dc3545" onclick="clearDuplicates()">Clean Duplicates</button>
        <input type="text" id="search" class="search-box" placeholder="Search leads by name, phone, or location...">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Lead Date</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Status</th>
                    <th>Sent To</th>
                    <th>Visit</th>
                    <th>Location</th>
                    <th>Property</th>
                    <th>Follow-up</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="clientTable"></tbody>
        </table>
    </div>
</div>

<script>
    let clients = JSON.parse(localStorage.getItem('clients')) || [];
    const todayStr = new Date().toISOString().split('T')[0];

    // --- REFINED VOICE ENGINE ---
    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            msg.voice = voices.find(v => v.lang.includes('en-IN')) || voices.find(v => v.lang.includes('hi-IN')) || voices[0];
            msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }
    }

    function checkReminders(manual = false) {
        const dueToday = clients.filter(c => c.followup === todayStr && c.status !== 'Not Interested' && c.status !== 'Closed');
        const alertBox = document.getElementById('reminderAlert');
        
        if (dueToday.length > 0) {
            alertBox.style.display = 'block';
            alertBox.innerHTML = `🔔 IMPORTANT: ${dueToday.length} follow-ups scheduled for today!`;
            
            if (manual || localStorage.getItem('lastRun') !== todayStr) {
                speak(`Hello Aditya. You have ${dueToday.length} follow ups at the top of your list today.`);
                if(!manual) localStorage.setItem('lastRun', todayStr);
            }
        } else {
            alertBox.style.display = 'none';
            if(manual) alert("No follow-ups for today.");
        }
    }

    // --- RENDERING ENGINE ---
    function renderTable() {
        const table = document.getElementById('clientTable');
        table.innerHTML = '';
        const isDark = document.body.classList.contains('dark-mode');
        const pinned = clients.filter(c => c.followup === todayStr && c.status !== 'Not Interested' && c.status !== 'Closed');
        const others = clients.filter(c => c.followup !== todayStr || c.status === 'Not Interested' || c.status === 'Closed');

        const createRow = (c) => {
            const idx = clients.indexOf(c);
            const statusColors = {'Hot': isDark ? '#ff6b6b' : '#fa3e3e', 'Closed': '#28a745', 'Follow-up': '#f39c12', 'Not Interested': '#8e8e93'};
            const sCol = statusColors[c.status] || '#1877f2';
            const visitMark = c.visitDone ? '<span class="visit-tick">✓</span>' : '-';

            return `<tr class="${c.followup === todayStr && c.status !== 'Not Interested' && c.status !== 'Closed' ? 'row-highlight' : ''}">
                <td>${c.leadDate || '-'}</td>
                <td>${c.name}</td>
                <td>${c.phone}</td>
                <td style="color:${sCol}; font-weight:bold;">${c.status}</td>
                <td>${c.sentTo || '-'}</td>
                <td>${visitMark}</td>
                <td>${c.location || '-'}</td>
                <td>${c.propertyType || '-'}</td>
                <td>${c.followup || '-'}</td>
                <td style="display:flex; gap:6px; justify-content:center; border:none; padding:8px;">
                    <button class="btn-wa" onclick='sendWA(${JSON.stringify(c)})'>WA</button>
                    <button class="btn-edit" onclick="editClient(${idx})">Edit</button>
                    <button class="btn-del" onclick="deleteClient(${idx})">Del</button>
                </td>
            </tr>`;
        };

        if (pinned.length > 0) {
            table.innerHTML += `<tr class="section-divider"><td colspan="10">Urgent Priorities (Today)</td></tr>`;
            pinned.forEach(c => table.innerHTML += createRow(c));
            table.innerHTML += `<tr class="section-divider"><td colspan="10">All Records</td></tr>`;
        }
        others.forEach(c => table.innerHTML += createRow(c));
    }

    // --- BUSINESS ACTIONS ---
    function sendWA(c) {
        const p = c.phone.replace(/\D/g, '');
        window.open(`https://wa.me/${p}?text=Hello ${c.name}, following up from True Invest regarding your property interest.`, '_blank');
    }

    document.getElementById('clientForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const data = {
            leadDate: document.getElementById('leadDate').value,
            followup: document.getElementById('followup').value,
            name: document.getElementById('name').value, 
            phone: document.getElementById('phone').value,
            location: document.getElementById('location').value, 
            propertyType: document.getElementById('propertyType').value,
            status: document.getElementById('status').value,
            visitDone: document.getElementById('visitDone').checked,
            sentTo: document.getElementById('sendSunny').checked ? "Sunny" : "",
            budget: document.getElementById('budget').value, 
            remark: document.getElementById('remark').value
        };
        const editIdx = document.getElementById('editIndex').value;
        if(editIdx === "") {
            clients.push(data);
        } else {
            clients[parseInt(editIdx)] = data;
        }
        localStorage.setItem('clients', JSON.stringify(clients));
        resetForm(); renderTable(); checkReminders(false);
    });

    function editClient(idx) {
        const c = clients[idx];
        document.getElementById('editIndex').value = idx;
        ['leadDate', 'followup', 'name', 'phone', 'location', 'propertyType', 'status', 'budget', 'remark'].forEach(k => {
            document.getElementById(k).value = c[k] || '';
        });
        document.getElementById('visitDone').checked = c.visitDone || false;
        document.getElementById('sendSunny').checked = c.sentTo === "Sunny";
        document.getElementById('saveBtn').innerText = "Update Record";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function deleteClient(idx) {
        if(confirm("Permanently delete this record?")) {
            clients.splice(idx, 1);
            localStorage.setItem('clients', JSON.stringify(clients));
            renderTable();
            checkReminders(false);
        }
    }

    function resetForm() { 
        document.getElementById('clientForm').reset(); 
        document.getElementById('editIndex').value = ""; 
        document.getElementById('saveBtn').innerText = "Save Record"; 
    }

    function toggleDarkMode() { 
        document.body.classList.toggle('dark-mode'); 
        localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); 
        renderTable(); 
    }

    function clearDuplicates() {
        const u = {}; clients.forEach(c => { u[c.phone.replace(/\D/g, '')] = c; });
        clients = Object.values(u); localStorage.setItem('clients', JSON.stringify(clients));
        renderTable(); alert("Duplicate numbers cleaned.");
    }

    // --- REFINED IMPORT/EXPORT ---
    function importCSV(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const lines = e.target.result.split(/\r?\n/);
            const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/"/g, ''));
            const map = {'leaddate':'leadDate','name':'name','phone':'phone','status':'status','visit':'visitDone','location':'location','property':'propertyType','budget':'budget','followup':'followup','remark':'remark','sentto':'sentTo'};
            
            for(let i=1; i<lines.length; i++) {
                const row = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if(row.length < 2) continue;
                const c = {};
                headers.forEach((h, j) => {
                    let v = row[j] ? row
