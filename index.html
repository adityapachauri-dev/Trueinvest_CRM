<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRUE INVEST CRM | Pro Edition</title>
    
    <style>
        :root {
            --primary: #1877f2; --bg: #f0f2f5; --card: #ffffff; 
            --text: #1c1e21; --border: #dddfe2; --whatsapp: #25D366;
        }
        body.dark-mode { --bg: #18191a; --card: #242526; --text: #e4e6eb; --border: #3e4042; }
        
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }
        .container { width: 100%; max-width: 500px; margin: auto; padding: 15px; box-sizing: border-box; }
        
        header { background: var(--card); padding: 15px; text-align: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        h1 { margin: 0; font-size: 1.2rem; color: var(--primary); }

        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; border: 1px solid var(--border); }
        
        label { display: block; font-size: 11px; font-weight: 800; opacity: 0.6; margin-top: 10px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 15px; box-sizing: border-box; margin-top: 5px; }

        .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

        .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); background: var(--card); }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid var(--border); font-size: 13px; }
        th { background: var(--bg); font-weight: 700; font-size: 11px; }

        .status-hot { color: #fa3e3e; font-weight: bold; }
        .hidden { display: none !important; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<header><h1>TRUE INVEST CRM</h1></header>

<div id="loginView" class="container">
    <div class="card">
        <h2 style="text-align:center;">Secure Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn btn-primary" onclick="login()">Login</button>
        <p id="err" style="color:red; text-align:center; font-size:12px; display:none;"></p>
    </div>
</div>

<div id="crmView" class="container hidden">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <button class="btn btn-outline" style="width:auto;" onclick="auth.signOut()">Logout</button>
        <button class="btn btn-outline" style="width:auto;" onclick="document.body.classList.toggle('dark-mode')">Theme</button>
    </div>

    <form id="leadForm" class="card">
        <input type="hidden" id="editId">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <input type="date" id="leadDate">
            <input type="date" id="followup">
        </div>
        <input type="text" id="name" placeholder="Client Name" required>
        <input type="tel" id="phone" placeholder="Phone Number" required>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <select id="status">
                <option>New</option><option>Follow-up</option><option>Hot</option><option>Closed</option>
            </select>
            <input type="text" id="budget" placeholder="Budget (Lacs)">
        </div>
        <textarea id="remark" placeholder="Notes..."></textarea>
        <button type="submit" class="btn btn-primary" id="saveBtn">Save to Cloud</button>
    </form>

    <div class="card">
        <input type="text" id="search" placeholder="Search your leads..." style="margin-bottom:10px;">
        <button class="btn btn-outline" style="background:#f1f9f3" onclick="exportCSV()">Export CSV</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr><th>Date</th><th>Name</th><th>Phone</th><th>Status</th><th>Budget</th><th>Follow-up</th><th>Actions</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // --- CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyAsb9cwYp3LJWM7motWSK6UAy2ct7t-6zY", 
        authDomain: "truecrm-6cf8e.firebaseapp.com",
        projectId: "truecrm-6cf8e",
        storageBucket: "truecrm-6cf8e.firebasestorage.app",
        messagingSenderId: "791381407537",
        appId: "1:791381407537:web:45e9946a939f8d23b56210"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let leads = [];

    // --- AUTH ---
    function login() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        auth.signInWithEmailAndPassword(e, p).catch(err => {
            document.getElementById('err').innerText = err.message;
            document.getElementById('err').style.display = 'block';
        });
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('crmView').classList.remove('hidden');
            syncLeads();
        } else {
            document.getElementById('loginView').classList.remove('hidden');
            document.getElementById('crmView').classList.add('hidden');
        }
    });

    // --- DATA ---
    function syncLeads() {
        const user = auth.currentUser;
        // SIMPLE QUERY: No complex sorting to avoid Index Errors
        db.collection("leads").where("owner", "==", user.uid).onSnapshot(snap => {
            leads = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
            render();
        });
    }

    document.getElementById('leadForm').addEventListener('submit', e => {
        e.preventDefault();
        const user = auth.currentUser;
        const data = {
            owner: user.uid,
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            leadDate: document.getElementById('leadDate').value || new Date().toISOString().split('T')[0],
            followup: document.getElementById('followup').value || "",
            status: document.getElementById('status').value,
            budget: document.getElementById('budget').value || "",
            remark: document.getElementById('remark').value || ""
        };
        const id = document.getElementById('editId').value;
        const task = id ? db.collection("leads").doc(id).update(data) : db.collection("leads").add(data);
        task.then(() => {
            document.getElementById('leadForm').reset();
            document.getElementById('editId').value = "";
            document.getElementById('saveBtn').innerText = "Save to Cloud";
        });
    });

    function render() {
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        // Sort in memory instead of database to avoid Firebase Index errors
        const sorted = leads.sort((a,b) => b.leadDate.localeCompare(a.leadDate));
        
        sorted.forEach(l => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${l.leadDate}</td>
                <td><b>${l.name}</b></td>
                <td>${l.phone}</td>
                <td class="${l.status === 'Hot' ? 'status-hot' : ''}">${l.status}</td>
                <td>${l.budget}</td>
                <td>${l.followup}</td>
                <td>
                    <button onclick="edit('${l.id}')">Edit</button>
                    <button onclick="wa('${l.phone}', '${l.name}')" style="color:green">WA</button>
                    <button onclick="del('${l.id}')" style="color:red">Del</button>
                </td>
            `;
            body.appendChild(tr);
        });
    }

    function edit(id) {
        const l = leads.find(x => x.id === id);
        document.getElementById('editId').value = l.id;
        document.getElementById('name').value = l.name;
        document.getElementById('phone').value = l.phone;
        document.getElementById('leadDate').value = l.leadDate;
        document.getElementById('followup').value = l.followup;
        document.getElementById('status').value = l.status;
        document.getElementById('budget').value = l.budget;
        document.getElementById('remark').value = l.remark;
        document.getElementById('saveBtn').innerText = "Update Lead";
    }

    function del(id) { if(confirm("Delete lead?")) db.collection("leads").doc(id).delete(); }
    function wa(n, name) { window.open(`https://wa.me/91${n.replace(/\D/g,'')}?text=Hello ${name}...`); }
    function exportCSV() {
        let csv = "Date,Name,Phone,Status,Budget\n";
        leads.forEach(l => csv += `"${l.leadDate}","${l.name}","${l.phone}","${l.status}","${l.budget}"\n`);
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
        a.download = "Leads.csv"; a.click();
    }

    document.getElementById('search').addEventListener('input', e => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('#tableBody tr').forEach(tr => {
            tr.style.display = tr.innerText.toLowerCase().includes(val) ? '' : 'none';
        });
    });
</script>
</body>
</html>
