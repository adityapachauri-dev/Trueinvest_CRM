<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRUE INVEST CRM - Cloud</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-color: #f0f2f5; --card-bg: #ffffff; --text-color: #1c1e21; --border-color: #dddfe2;
            --accent-blue: #1877f2; --whatsapp-green: #25D366; --notify-red: #fa3e3e; --highlight-today: #fff9c4;
        }
        body.dark-mode {
            --bg-color: #18191a; --card-bg: #242526; --text-color: #e4e6eb; --border-color: #3e4042; --highlight-today: #4d4600;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-color); color: var(--text-color); margin: 0; 
            padding-bottom: env(safe-area-inset-bottom, 100px); transition: 0.3s;
        }

        /* Login Screen Styles */
        #authScreen { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--accent-blue); }
        .login-card { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; }
        
        /* Main CRM Styles */
        #mainApp { display: none; }
        .container { width: 100%; max-width: 800px; margin: auto; padding: 12px; box-sizing: border-box; }
        h1 { text-align: center; font-size: 1.4rem; font-weight: 700; margin: 15px 0; }
        
        .notification-bar { 
            background: var(--notify-red); color: white; padding: 14px; 
            text-align: center; border-radius: 10px; margin-bottom: 12px; 
            display: none; font-size: 14px; font-weight: bold;
        }

        form, .table-container { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        
        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 4px; text-transform: uppercase; opacity: 0.7; }
        input, textarea, button, select { 
            padding: 12px; margin: 6px 0 12px 0; width: 100%; border: 1px solid var(--border-color); 
            border-radius: 8px; background: var(--card-bg); color: var(--text-color); font-size: 16px; 
            box-sizing: border-box;
        }
        
        button { cursor: pointer; background: var(--accent-blue); color: #fff; border: none; font-weight: bold; height: 50px; border-radius: 10px; }
        .btn-secondary { background: #606770; height: 44px; font-size: 14px; margin-top: 0; }
        .btn-logout { background: #dc3545; height: 35px; margin-bottom: 20px; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .search-box { grid-column: span 2; border: 2px solid var(--accent-blue); }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-color); text-align: center; font-size: 14px; }
        
        .row-highlight { background-color: var(--highlight-today) !important; }
        .btn-wa { background: var(--whatsapp-green) !important; width: 44px; }
        .fab { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--accent-blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; text-decoration: none; z-index: 100; }
    </style>
</head>
<body>

<div id="authScreen">
    <div class="login-card">
        <h2>TRUE INVEST CRM</h2>
        <p>Login to your Cloud Workspace</p>
        <input type="email" id="loginEmail" placeholder="Email Address">
        <input type="password" id="loginPassword" placeholder="Password">
        <button onclick="handleLogin()">Login</button>
        <p id="loginError" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<div id="mainApp">
    <div class="container">
        <button class="btn-logout" onclick="handleLogout()">Logout</button>
        <a href="#clientForm" class="fab">+</a>
        <h1>TRUE INVEST CRM</h1>
        <div id="reminderAlert" class="notification-bar"></div>

        <form id="clientForm">
            <input type="hidden" id="editId" value="">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label>Lead Date</label><input type="date" id="leadDate"></div>
                <div><label>Follow-up</label><input type="date" id="followup"></div>
            </div>
            <input type="text" id="name" placeholder="Client Name" required>
            <input type="tel" id="phone" placeholder="Phone Number" required>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="text" id="location" placeholder="Location">
                <input type="text" id="propertyType" placeholder="Property Type">
            </div>
            <select id="status">
                <option>New</option><option>Follow-up</option><option>Hot</option><option>Closed</option><option>Not Interested</option>
            </select>
            <button type="submit" id="saveBtn">Save to Cloud</button>
            <button type="button" class="btn-secondary" onclick="resetForm()">Cancel</button>
        </form>

        <div class="controls">
            <button class="btn-secondary" onclick="toggleDarkMode()">Theme</button>
            <button class="btn-secondary" style="background:#28a745" onclick="exportData()">Export CSV</button>
            <input type="text" id="search" class="search-box" placeholder="Search leads...">
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Name</th><th>Phone</th><th>Status</th><th>Property</th><th>Follow-up</th><th>Action</th></tr>
                </thead>
                <tbody id="clientTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- 1. FIREBASE CONFIG (PASTE YOUR KEYS HERE) ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let clients = [];
    const todayStr = new Date().toISOString().split('T')[0];

    // --- 2. AUTHENTICATION LOGIC ---
    function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        auth.signInWithEmailAndPassword(email, pass).catch(err => {
            document.getElementById('loginError').innerText = err.message;
        });
    }

    function handleLogout() { auth.signOut(); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            syncData();
        } else {
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
        }
    });

    // --- 3. DATA SYNC (FIRESTORE) ---
    function syncData() {
        db.collection("leads").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            clients = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderTable();
            checkReminders();
        });
    }

    // --- 4. CRM CORE LOGIC ---
    async function saveLead(e) {
        e.preventDefault();
        const leadId = document.getElementById('editId').value;
        const data = {
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            leadDate: document.getElementById('leadDate').value,
            followup: document.getElementById('followup').value,
            location: document.getElementById('location').value,
            propertyType: document.getElementById('propertyType').value,
            status: document.getElementById('status').value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        if (leadId) {
            await db.collection("leads").doc(leadId).update(data);
        } else {
            await db.collection("leads").add(data);
        }
        resetForm();
    }
    document.getElementById('clientForm').addEventListener('submit', saveLead);

    function renderTable() {
        const table = document.getElementById('clientTable');
        table.innerHTML = '';
        clients.forEach(c => {
            const isToday = c.followup === todayStr;
            const row = `<tr class="${isToday ? 'row-highlight' : ''}">
                <td>${c.name}</td><td>${c.phone}</td><td>${c.status}</td>
                <td>${c.propertyType}</td><td>${c.followup}</td>
                <td>
                    <button class="btn-wa" onclick="sendWA('${c.phone}', '${c.name}')">WA</button>
                    <button onclick="editLead('${c.id}')">Edit</button>
                </td></tr>`;
            table.innerHTML += row;
        });
    }

    function sendWA(phone, name) {
        window.open(`https://wa.me/${phone.replace(/\D/g,'')}?text=Hello ${name}, regarding your property interest...`, '_blank');
    }

    function editLead(id) {
        const c = clients.find(x => x.id === id);
        document.getElementById('editId').value = id;
        document.getElementById('name').value = c.name;
        document.getElementById('phone').value = c.phone;
        document.getElementById('followup').value = c.followup;
        document.getElementById('saveBtn').innerText = "Update Cloud Record";
        window.scrollTo(0,0);
    }

    function resetForm() {
        document.getElementById('clientForm').reset();
        document.getElementById('editId').value = "";
        document.getElementById('saveBtn').innerText = "Save to Cloud";
        document.getElementById('leadDate').value = todayStr;
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }

    function checkReminders() {
        const dueToday = clients.filter(c => c.followup === todayStr && c.status !== 'Closed');
        const alertBox = document.getElementById('reminderAlert');
        if (dueToday.length > 0) {
            alertBox.style.display = 'block';
            alertBox.innerHTML = `🔔 ${dueToday.length} Follow-ups due today!`;
        } else { alertBox.style.display = 'none'; }
    }

    document.getElementById('leadDate').value = todayStr;
</script>
</body>
</html>
