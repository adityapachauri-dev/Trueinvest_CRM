<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRUE INVEST CRM - Cloud Edition</title>
    
    <style>
        :root {
            --bg-color: #f0f2f5; --card-bg: #ffffff; --text-color: #1c1e21; --border-color: #dddfe2;
            --accent-blue: #1877f2; --whatsapp-green: #25D366; --notify-red: #fa3e3e; --highlight-today: #fff9c4;
        }
        body.dark-mode {
            --bg-color: #18191a; --card-bg: #242526; --text-color: #e4e6eb; --border-color: #3e4042; --highlight-today: #4d4600;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-color); color: var(--text-color); margin: 0; 
            padding-bottom: env(safe-area-inset-bottom, 100px); transition: 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        .container { width: 100%; max-width: 500px; margin: auto; padding: 12px; box-sizing: border-box; }
        
        h1 { text-align: center; font-size: 1.4rem; font-weight: 700; margin: 15px 0; }
        .notification-bar { 
            background: var(--notify-red); color: white; padding: 14px; 
            text-align: center; border-radius: 10px; margin-bottom: 12px; 
            display: none; font-size: 14px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        }

        form, .table-container, .login-card { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        
        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 4px; text-transform: uppercase; opacity: 0.7; }
        input, textarea, button, select { 
            padding: 12px; margin: 6px 0 12px 0; width: 100%; border: 1px solid var(--border-color); 
            border-radius: 8px; background: var(--card-bg); color: var(--text-color); font-size: 16px; 
            box-sizing: border-box; appearance: none; -webkit-appearance: none;
        }
        
        .check-item { 
            display: flex; align-items: center; gap: 8px; background: var(--bg-color); 
            padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border-color);
            margin-bottom: 15px;
        }
        .check-item input[type="checkbox"] { width: 22px; height: 22px; margin: 0; -webkit-appearance: checkbox; }
        .check-item label { margin: 0; font-size: 14px; font-weight: 600; cursor: pointer; }

        button { cursor: pointer; background: var(--accent-blue); color: #fff; border: none; font-weight: bold; height: 50px; border-radius: 10px; font-size: 16px; transition: 0.2s;}
        button:active { opacity: 0.8; }
        .btn-secondary { background: #606770; height: 44px; font-size: 14px; margin-top: 0; }
        .btn-logout { background: var(--notify-red); margin-bottom: 15px; }
        
        .btn-wa { background: var(--whatsapp-green) !important; width: 44px !important; display: flex; align-items: center; justify-content: center; }
        .btn-edit { background: #ffc107 !important; color: #000 !important; width: 50px !important; }
        .btn-del { background: #fa3e3e !important; width: 50px !important; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .search-box { grid-column: span 2; border: 2px solid var(--accent-blue); }

        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-color); text-align: center; font-size: 14px; }
        th { background: var(--bg-color); position: sticky; top: 0; z-index: 10; font-weight: 700; }
        
        .row-highlight { background-color: var(--highlight-today) !important; font-weight: 600; }
        .section-divider { background: #606770 !important; color: white; font-size: 11px; text-align: left; padding: 10px 15px; font-weight: bold; }
        .visit-tick { color: #28a745; font-weight: bold; font-size: 18px; }

        .fab { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--accent-blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 100; text-decoration: none; }
        #csvImport { display: none; }

        /* Utility classes for toggling views */
        .hidden { display: none !important; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="loginView" class="container" style="margin-top: 50px;">
    <h1>TRUE INVEST</h1>
    <div class="login-card">
        <h2 style="font-size: 1.1rem; text-align: center; margin-top: 0;">Agent Login</h2>
        <form id="loginForm">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="admin@trueinvest.com" required>
            
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter password" required>
            
            <button type="submit" id="loginBtn">Secure Login</button>
            <div id="loginError" style="color: var(--notify-red); margin-top: 10px; text-align: center; font-size: 14px; display: none;"></div>
        </form>
    </div>
</div>

<div id="crmView" class="container hidden">
    <a href="#clientForm" class="fab">+</a>
    <h1>TRUE INVEST CRM</h1>
    <button class="btn-secondary btn-logout" onclick="logout()">Logout</button>
    <div id="reminderAlert" class="notification-bar"></div>

    <form id="clientForm">
        <input type="hidden" id="editId" value="">
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>Lead Date</label><input type="date" id="leadDate"></div>
            <div><label>Follow-up Date</label><input type="date" id="followup"></div>
        </div>

        <input type="text" id="name" placeholder="Client Name" required>
        <input type="tel" id="phone" placeholder="Phone Number" required>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <input type="text" id="location" placeholder="Location">
            <input type="text" id="propertyType" placeholder="Property Type">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>Status</label>
                <select id="status">
                    <option>New</option>
                    <option>Follow-up</option>
                    <option>Hot</option>
                    <option>Closed</option>
                    <option>Not Interested</option>
                </select>
            </div>
            <div>
                <label>Site Visit</label>
                <div class="check-item" style="height: 48px; justify-content: center; margin: 6px 0 12px 0;">
                    <input type="checkbox" id="visitDone">
                    <label for="visitDone">Done</label>
                </div>
            </div>
        </div>

        <div class="check-item">
            <input type="checkbox" id="sendSunny">
            <label for="sendSunny">Assigned to Sunny</label>
        </div>

        <input type="text" id="budget" placeholder="Budget">
        <textarea id="remark" placeholder="Remarks"></textarea>
        
        <button type="submit" id="saveBtn">Save Record to Cloud</button>
        <button type="button" class="btn-secondary" onclick="resetForm()">Clear / Cancel</button>
    </form>

    <div class="controls">
        <button class="btn-secondary" onclick="toggleDarkMode()">Theme</button>
        <button class="btn-secondary" style="background:#28a745" onclick="downloadExcel()">Export CSV</button>
        <button class="btn-secondary" style="background:#17a2b8" onclick="document.getElementById('csvImport').click()">Import CSV</button>
        <input type="file" id="csvImport" accept=".csv" onchange="importCSV(event)">
        <button class="btn-secondary" style="background:#dc3545" onclick="clearDuplicates()">Clean Duplicates</button>
        <input type="text" id="search" class="search-box" placeholder="Search by name, phone, or area...">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Lead Date</th><th>Name</th><th>Phone</th><th>Status</th><th>Sent To</th><th>Visit</th><th>Location</th><th>Property</th><th>Follow-up</th><th>Action</th>
                </tr>
            </thead>
            <tbody id="clientTable"></tbody>
        </table>
    </div>
</div>

<script>
    // ==========================================
    // 1. FIREBASE CONFIGURATION
    // REPLACE THESE VALUES WITH YOUR REAL FIREBASE PROJECT KEYS!
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyAsb9cwYp3LJWM7motWSK6UAy2ct7t-6zY", 
        authDomain: "truecrm-6cf8e.firebaseapp.com",
        projectId: "truecrm-6cf8e",
        storageBucket: "truecrm-6cf8e.firebasestorage.app",
        messagingSenderId: "791381407537",
        appId: "1:791381407537:web:45e9946a939f8d23b56210"
    };

    // Initialize Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ==========================================
    // 2. GLOBAL VARIABLES
    // ==========================================
    let clients = [];
    
    // Calculate today's date adjusted for local timezone offset
    const today = new Date();
    const offset = today.getTimezoneOffset() * 60000;
    const todayStr = (new Date(today - offset)).toISOString().split('T')[0];

    const loginView = document.getElementById('loginView');
    const crmView = document.getElementById('crmView');

    // ==========================================
    // 3. AUTHENTICATION LOGIC
    // ==========================================
    auth.onAuthStateChanged(user => {
        if (user) {
            loginView.classList.add('hidden');
            crmView.classList.remove('hidden');
            loadDataFromCloud(); 
        } else {
            loginView.classList.remove('hidden');
            crmView.classList.add('hidden');
        }
    });

    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const errorDiv = document.getElementById('loginError');
        const loginBtn = document.getElementById('loginBtn');

        loginBtn.innerText = "Authenticating...";
        auth.signInWithEmailAndPassword(email, password)
            .then(() => {
                errorDiv.style.display = 'none';
                loginBtn.innerText = "Secure Login";
            })
            .catch((error) => {
                errorDiv.innerText = error.message;
                errorDiv.style.display = 'block';
                loginBtn.innerText = "Secure Login";
            });
    });

    function logout() {
        auth.signOut();
    }

    // ==========================================
    // 4. CLOUD DATABASE LOGIC
    // ==========================================
    function loadDataFromCloud() {
        db.collection("leads").orderBy("leadDate", "desc").onSnapshot((snapshot) => {
            clients = [];
            snapshot.forEach((doc) => {
                clients.push({ id: doc.id, ...doc.data() });
            });
            renderTable();
            checkReminders(false);
        }, (error) => {
            console.error("Error fetching leads: ", error);
        });
    }

    document.getElementById('clientForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const data = {
            leadDate: document.getElementById('leadDate').value,
            followup: document.getElementById('followup').value,
            name: document.getElementById('name').value, 
            phone: document.getElementById('phone').value,
            location: document.getElementById('location').value, 
            propertyType: document.getElementById('propertyType').value,
            status: document.getElementById('status').value,
            visitDone: document.getElementById('visitDone').checked,
            sentTo: document.getElementById('sendSunny').checked ? "Sunny" : "",
            budget: document.getElementById('budget').value, 
            remark: document.getElementById('remark').value,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        const editId = document.getElementById('editId').value;
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.innerText = "Saving...";
        
        if(editId === "") {
            db.collection("leads").add(data).then(() => resetForm());
        } else {
            db.collection("leads").doc(editId).update(data).then(() => resetForm());
        }
    });

    function editClient(id) {
        const c = clients.find(client => client.id === id);
        if(!c) return;

        document.getElementById('editId').value = c.id;
        ['leadDate', 'followup', 'name', 'phone', 'location', 'propertyType', 'status', 'budget', 'remark'].forEach(k => {
            document.getElementById(k).value = c[k] || '';
        });
        document.getElementById('visitDone').checked = c.visitDone || false;
        document.getElementById('sendSunny').checked = c.sentTo === "Sunny";
        document.getElementById('saveBtn').innerText = "Update Cloud Record";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function deleteClient(id) {
        if(confirm("Permanently delete this record from the cloud?")) {
            db.collection("leads").doc(id).delete();
        }
    }

    function resetForm() { 
        document.getElementById('clientForm').reset(); 
        document.getElementById('editId').value = ""; 
        document.getElementById('visitDone').checked = false;
        document.getElementById('sendSunny').checked = false;
        document.getElementById('saveBtn').innerText = "Save Record to Cloud"; 
    }

    // ==========================================
    // 5. SOUND ENGINE & REMINDERS
    // ==========================================
    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            msg.voice = voices.find(v => v.lang.includes('en-IN')) || voices.find(v => v.lang.includes('hi-IN')) || voices[0];
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }
    }

    function checkReminders(manual = false) {
        const dueToday = clients.filter(c => c.followup === todayStr && c.status !== 'Not Interested' && c.status !== 'Closed');
        const alertBox = document.getElementById('reminderAlert');
        
        if (dueToday.length > 0) {
            alertBox.style.display = 'block';
            alertBox.innerHTML = `🔔 ${dueToday.length} Follow-ups Today!`;
            if (manual || localStorage.getItem('lastRunDate') !== todayStr) {
                speak(`Namaste. You have ${dueToday.length} follow up calls for today.`);
                if(!manual) localStorage.setItem('lastRunDate', todayStr);
            }
        } else {
            alertBox.style.display = 'none';
        }
    }

    // ==========================================
    // 6. UI & RENDER LOGIC
    // ==========================================
    function renderTable() {
        const table = document.getElementById('clientTable');
        table.innerHTML = '';
        const isDark = document.body.classList.contains('dark-mode');
        
        const pinned = clients.filter(c => c.followup === todayStr && c.status !== 'Not Interested' && c.status !== 'Closed');
        const others = clients.filter(c => c.followup !== todayStr || c.status === 'Not Interested' || c.status === 'Closed');

        const createRow = (c) => {
            const sColors = {'Hot': isDark ? '#ff6b6b' : '#fa3e3e', 'Closed': '#28a745', 'Follow-up': '#f39c12', 'Not Interested': '#8e8e93'};
            const visitMark = c.visitDone ? '<span class="visit-tick">✓</span>' : '-';

            return `<tr class="${c.followup === todayStr && c.status !== 'Not Interested' ? 'row-highlight' : ''}">
                <td>${c.leadDate || '-'}</td><td>${c.name}</td><td>${c.phone}</td>
                <td style="color:${sColors[c.status] || '#1877f2'}; font-weight:bold;">${c.status}</td>
                <td>${c.sentTo || '-'}</td><td>${visitMark}</td><td>${c.location || '-'}</td>
                <td>${c.propertyType || '-'}</td><td>${c.followup || '-'}</td>
                <td style="display:flex; gap:6px; justify-content:center; border:none; padding:8px;">
                    <button class="btn-wa" onclick='sendWA(${JSON.stringify(c)})'>WA</button>
                    <button class="btn-edit" onclick="editClient('${c.id}')">Edit</button>
                    <button class="btn-del" onclick="deleteClient('${c.id}')">Del</button>
                </td></tr>`;
        };

        if (pinned.length > 0) {
            table.innerHTML += `<tr class="section-divider"><td colspan="10">Urgent Priorities (Today)</td></tr>`;
            pinned.forEach(c => table.innerHTML += createRow(c));
            table.innerHTML += `<tr class="section-divider"><td colspan="10">All Leads</td></tr>`;
        }
        others.forEach(c => table.innerHTML += createRow(c));
    }

    function sendWA(c) {
        const p = c.phone.replace(/\D/g, '');
        window.open(`https://wa.me/${p}?text=Hello ${c.name}, following up regarding your property interest with True Invest.`, '_blank');
    }

    function toggleDarkMode() { 
        document.body.classList.toggle('dark-mode'); 
        localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); 
        renderTable(); 
    }

    // ==========================================
    // 7. UTILITIES (Duplicates, Import, Export)
    // ==========================================
    function clearDuplicates() {
        const u = {}; 
        let deletedCount = 0;

        for (let i = clients.length - 1; i >= 0; i--) {
            const c = clients[i];
            const cleanPhone = c.phone.replace(/\D/g, '');
            if (u[cleanPhone]) {
                db.collection("leads").doc(c.id).delete();
                deletedCount++;
            } else {
                u[cleanPhone] = true;
            }
        }
        alert(`Cleaned ${deletedCount} duplicate leads from the database.`);
    }

    function downloadExcel() {
        let csv = "Lead Date,Name,Phone,Status,Sent To,Visit,Location,Property,Budget,Follow-up,Remark\n";
        
        // Use a helper function to safely escape strings for CSV formats
        const escapeCSV = (str) => {
            if (str === null || str === undefined) return '""';
            const safeStr = String(str).replace(/"/g, '""');
            return `"${safeStr}"`;
        };

        clients.forEach(c => {
            csv += `${escapeCSV(c.leadDate)},${escapeCSV(c.name)},${escapeCSV(c.phone)},${escapeCSV(c.status)},${escapeCSV(c.sentTo)},${escapeCSV(c.visitDone ? "Yes" : "No")},${escapeCSV(c.location)},${escapeCSV(c.propertyType)},${escapeCSV(c.budget)},${escapeCSV(c.followup)},${escapeCSV(c.remark)}\n`;
        });
        
        const a = document.createElement('a'); 
        a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
        a.download = 'TrueInvest_CRM.csv'; 
        a.click();
    }

    function importCSV(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            const rows = text.split('\n');
            let importedCount = 0;

            // Skip header row (i = 1)
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i].trim();
                if (!row) continue;

                // Simple regex to handle comma separation even inside quotes
                const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                if (!cols) continue;

                const cleanCols = cols.map(c => c.replace(/^"|"$/g, '').trim());

                if (cleanCols.length >= 3 && cleanCols[1] !== "") { 
                    const data = {
                        leadDate: cleanCols[0] || '',
                        name: cleanCols[1] || '',
                        phone: cleanCols[2] || '',
                        status: cleanCols[3] || 'New',
                        sentTo: cleanCols[4] || '',
                        visitDone: cleanCols[5] === 'Yes',
                        location: cleanCols[6] || '',
                        propertyType: cleanCols[7] || '',
                        budget: cleanCols[8] || '',
                        followup: cleanCols[9] || '',
                        remark: cleanCols[10] || '',
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    db.collection("leads").add(data);
                    importedCount++;
                }
            }
            alert(`Successfully queued ${importedCount} leads for upload!`);
            document.getElementById('csvImport').value = ''; 
        };
        reader.readAsText(file);
    }

    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
    
    document.getElementById('search').addEventListener('input', function() {
        const v = this.value.toLowerCase();
        document.querySelectorAll('#clientTable tr:not(.section-divider)').forEach(r => r.style.display = r.innerText.toLowerCase().includes(v) ? '' : 'none');
    });

    // Audio trigger on mobile - required because browsers block unprompted audio
    document.addEventListener('touchstart', () => { setTimeout(() => checkReminders(false), 1000); }, {once: true});
</script>
</body>
</html>
