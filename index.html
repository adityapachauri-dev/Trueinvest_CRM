<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRUE INVEST CRM - Enterprise Edition</title>
    
    <style>
        :root {
            --bg-color: #f0f2f5; --card-bg: #ffffff; --text-color: #1c1e21; --border-color: #dddfe2;
            --accent-blue: #1877f2; --whatsapp-green: #25D366; --notify-red: #fa3e3e; --highlight-today: #fff9c4;
            --hot-bg: #ffebe9; --hot-text: #d93025; --closed-bg: #e6f4ea; --closed-text: #1e8e3e;
        }
        body.dark-mode {
            --bg-color: #18191a; --card-bg: #242526; --text-color: #e4e6eb; --border-color: #3e4042; --highlight-today: #4d4600;
            --hot-bg: #4c1e1e; --hot-text: #ff8a80; --closed-bg: #1b3320; --closed-text: #81c995;
        }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg-color); color: var(--text-color); margin: 0; 
            padding-bottom: 100px; transition: 0.3s;
        }
        .container { width: 100%; max-width: 600px; margin: auto; padding: 12px; box-sizing: border-box; }
        
        h1 { text-align: center; font-size: 1.6rem; font-weight: 800; color: var(--accent-blue); margin: 20px 0; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { 
            background: var(--card-bg); padding: 15px 5px; border-radius: 12px; 
            text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid var(--border-color);
        }
        .stat-card label { display: block; font-size: 9px; font-weight: 800; opacity: 0.6; text-transform: uppercase; }
        .stat-card span { font-size: 22px; font-weight: 900; }

        .notification-bar { 
            background: var(--notify-red); color: white; padding: 12px; 
            text-align: center; border-radius: 10px; margin-bottom: 15px; 
            display: none; font-size: 14px; font-weight: bold;
        }

        form, .login-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        
        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 5px; opacity: 0.8; }
        input, textarea, button, select { 
            padding: 12px; margin-bottom: 12px; width: 100%; border: 1px solid var(--border-color); 
            border-radius: 8px; background: var(--card-bg); color: var(--text-color); font-size: 16px; 
            box-sizing: border-box;
        }

        .check-item { 
            display: flex; align-items: center; gap: 10px; background: var(--bg-color); 
            padding: 12px; border-radius: 8px; border: 1px solid var(--border-color);
            margin-bottom: 12px; cursor: pointer;
        }
        .check-item input { width: 20px; height: 20px; margin: 0; }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; }
        .status-hot { background: var(--hot-bg); color: var(--hot-text); }
        .status-closed { background: var(--closed-bg); color: var(--closed-text); }

        .action-group { display: flex; gap: 4px; }
        .action-group button { height: 32px; font-size: 10px; padding: 0 8px; margin: 0; flex: 1; }

        .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border-color); background: var(--card-bg); }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-color); text-align: left; font-size: 13px; }
        th { background: var(--bg-color); font-weight: 800; font-size: 10px; text-transform: uppercase; color: #606770; }
        
        .row-today { background-color: var(--highlight-today) !important; border-left: 4px solid var(--notify-red); }
        .section-tag { background: #4b4f56; color: white; font-size: 10px; padding: 6px 12px; font-weight: 800; }

        .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: var(--accent-blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 100; text-decoration: none; }
        
        .watermark { text-align: center; margin-top: 40px; padding: 20px; opacity: 0.5; font-size: 10px; border-top: 1px solid var(--border-color); }
        .watermark span { color: var(--accent-blue); font-size: 14px; font-weight: 800; display: block; }
        
        .hidden { display: none !important; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="loginView" class="container" style="margin-top: 100px;">
    <h1>TRUE INVEST</h1>
    <div class="login-card">
        <form id="loginForm">
            <label>Work Email</label>
            <input type="email" id="loginEmail" placeholder="email@company.com" required>
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required>
            <button type="submit" id="loginBtn" style="background:var(--accent-blue); color:white; font-weight:800;">Login to CRM</button>
            <div id="loginError" style="color: var(--notify-red); margin-top: 10px; text-align: center; font-weight: 600; display: none;"></div>
        </form>
    </div>
</div>

<div id="crmView" class="container hidden">
    <a href="#clientForm" class="fab">＋</a>
    <h1>TRUE INVEST CRM</h1>
    <button onclick="logout()" style="background:var(--notify-red); color:white; margin-bottom:15px; height:40px; font-size:12px;">Sign Out</button>

    <div class="stats-grid">
        <div class="stat-card"><label>Total Leads</label><span id="statTotal" style="color:var(--accent-blue)">0</span></div>
        <div class="stat-card"><label>🔥 Hot</label><span id="statHot" style="color:var(--hot-text)">0</span></div>
        <div class="stat-card"><label>⏰ Today</label><span id="statFollow">0</span></div>
    </div>

    <div id="reminderAlert" class="notification-bar"></div>

    <form id="clientForm">
        <input type="hidden" id="editId">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>Lead Date</label><input type="date" id="leadDate"></div>
            <div><label>Follow-up</label><input type="date" id="followup"></div>
        </div>

        <label>Client Name</label>
        <input type="text" id="name" placeholder="Full Name" required>
        
        <label>Phone</label>
        <input type="tel" id="phone" placeholder="9910XXXXXX" required>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>Status</label>
                <select id="status">
                    <option>New</option>
                    <option>Follow-up</option>
                    <option>Hot</option>
                    <option>Closed</option>
                    <option>Not Interested</option>
                </select>
            </div>
            <div><label>Budget</label><input type="text" id="budget" placeholder="1.25 Cr"></div>
        </div>

        <div class="check-item">
            <input type="checkbox" id="visitDone">
            <label for="visitDone" style="margin:0">Site Visit Done ✅</label>
        </div>

        <div class="check-item">
            <input type="checkbox" id="sendSunny">
            <label for="sendSunny" style="margin:0">Assign lead to Sunny</label>
        </div>

        <label>Notes</label>
        <textarea id="remark" placeholder="Client requirements..." rows="2"></textarea>
        
        <button type="submit" id="saveBtn" style="background:var(--accent-blue); color:white; height:50px; font-weight:800;">Save to Cloud</button>
        <button type="button" onclick="resetForm()" style="background:#606770; color:white;">Clear Form</button>
    </form>

    <input type="text" id="search" placeholder="🔍 Search name or phone..." style="height:50px; border:2px solid var(--accent-blue);">

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>S.No</th>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Status</th>
                    <th>Visit</th>
                    <th>Budget</th>
                    <th>Assign</th>
                    <th>Follow-up</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="clientTable"></tbody>
        </table>
    </div>

    <div class="watermark">
        SYSTEM DESIGNED BY<br>
        <span>ADITYA PACHAURI</span>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsb9cwYp3LJWM7motWSK6UAy2ct7t-6zY", 
        authDomain: "truecrm-6cf8e.firebaseapp.com",
        projectId: "truecrm-6cf8e",
        storageBucket: "truecrm-6cf8e.firebasestorage.app",
        messagingSenderId: "791381407537",
        appId: "1:791381407537:web:45e9946a939f8d23b56210"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let clients = [];
    const getToday = () => new Date().toLocaleDateString('en-CA');

    auth.onAuthStateChanged(user => {
        if (user) { 
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('crmView').classList.remove('hidden');
            loadData();
        } else {
            document.getElementById('loginView').classList.remove('hidden');
            document.getElementById('crmView').classList.add('hidden');
        }
    });

    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value)
            .catch(err => {
                const errDiv = document.getElementById('loginError');
                errDiv.innerText = "Access Denied: " + err.message;
                errDiv.style.display = 'block';
            });
    });

    function logout() { auth.signOut(); }

    function loadData() {
        db.collection("leads").where("ownerId", "==", auth.currentUser.uid).orderBy("leadDate", "desc")
          .onSnapshot(snap => {
              clients = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
              renderTable();
              updateDashboard();
          });
    }

    function updateDashboard() {
        const today = getToday();
        const follow = clients.filter(c => c.followup === today && c.status !== 'Closed').length;
        document.getElementById('statTotal').innerText = clients.length;
        document.getElementById('statHot').innerText = clients.filter(c => c.status === 'Hot').length;
        document.getElementById('statFollow').innerText = follow;
        
        const bar = document.getElementById('reminderAlert');
        bar.style.display = follow ? 'block' : 'none';
        bar.innerText = `🚨 ACTION: ${follow} follow-ups required today!`;
    }

    document.getElementById('clientForm').addEventListener('submit', e => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const data = {
            ownerId: auth.currentUser.uid,
            leadDate: document.getElementById('leadDate').value || getToday(),
            followup: document.getElementById('followup').value || "",
            name: document.getElementById('name').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            status: document.getElementById('status').value,
            budget: document.getElementById('budget').value,
            visitDone: document.getElementById('visitDone').checked,
            sentTo: document.getElementById('sendSunny').checked ? "Sunny" : "",
            remark: document.getElementById('remark').value
        };

        const task = id ? db.collection("leads").doc(id).update(data) : db.collection("leads").add(data);
        task.then(() => resetForm()).catch(alert);
    });

    function renderTable() {
        const table = document.getElementById('clientTable');
        const today = getToday();
        table.innerHTML = '';
        
        // Sorting: Priority Today first, then others
        const sorted = [...clients].sort((a, b) => (a.followup === today ? -1 : 1));

        sorted.forEach((c, index) => {
            const isToday = c.followup === today && c.status !== 'Closed';
            const row = `
                <tr class="${isToday ? 'row-today' : ''}">
                    <td style="font-weight:bold; color:#888">${index + 1}</td>
                    <td>${c.leadDate}</td>
                    <td><b>${c.name}</b></td>
                    <td>${c.phone}</td>
                    <td><span class="badge ${c.status === 'Hot' ? 'status-hot' : (c.status === 'Closed' ? 'status-closed' : '')}">${c.status}</span></td>
                    <td>${c.visitDone ? '✅ Yes' : '❌ No'}</td>
                    <td style="color:#28a745; font-weight:bold">${c.budget || '-'}</td>
                    <td>${c.sentTo || '-'}</td>
                    <td style="color:var(--accent-blue); font-weight:bold">${c.followup || '-'}</td>
                    <td><div class="action-group">
                        <button style="background:#25D366; color:white" onclick="sendWA('${c.phone}', '${c.name}')">WA</button>
                        <button style="background:#ffc107" onclick="editLead('${c.id}')">EDIT</button>
                        <button style="background:#fa3e3e; color:white" onclick="deleteLead('${c.id}')">DEL</button>
                    </div></td>
                </tr>`;
            table.innerHTML += row;
        });
    }

    function editLead(id) {
        const c = clients.find(x => x.id === id);
        if(!c) return;
        document.getElementById('editId').value = c.id;
        document.getElementById('name').value = c.name;
        document.getElementById('phone').value = c.phone;
        document.getElementById('leadDate').value = c.leadDate;
        document.getElementById('followup').value = c.followup;
        document.getElementById('status').value = c.status;
        document.getElementById('budget').value = c.budget || '';
        document.getElementById('remark').value = c.remark || '';
        document.getElementById('visitDone').checked = !!c.visitDone;
        document.getElementById('sendSunny').checked = c.sentTo === "Sunny";
        document.getElementById('saveBtn').innerText = "Update Lead";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function deleteLead(id) { if(confirm("Permanently delete?")) db.collection("leads").doc(id).delete(); }

    function resetForm() { 
        document.getElementById('clientForm').reset(); 
        document.getElementById('editId').value = ""; 
        document.getElementById('saveBtn').innerText = "Save to Cloud";
    }

    function sendWA(num, name) {
        const clean = num.replace(/\D/g,'');
        const final = clean.length === 10 ? '91'+clean : clean;
        window.open(`https://wa.me/${final}?text=Hi ${name}, reaching out from True Invest.`, '_blank');
    }

    document.getElementById('search').addEventListener('input', e => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('#clientTable tr').forEach(tr => {
            tr.style.display = tr.innerText.toLowerCase().includes(val) ? '' : 'none';
        });
    });
</script>

</body>
</html>
