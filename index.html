<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRUE INVEST CRM | Master</title>
    <style>
        :root {
            --bg-color: #f0f2f5; --card-bg: #ffffff; --text-color: #1c1e21; --border-color: #dddfe2;
            --accent-blue: #1877f2; --whatsapp-green: #25D366; --notify-red: #fa3e3e;
        }
        body.dark-mode {
            --bg-color: #18191a; --card-bg: #242526; --text-color: #e4e6eb; --border-color: #3e4042;
        }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg-color); color: var(--text-color); margin: 0; padding-bottom: 30px;
        }
        .container { width: 100%; max-width: 500px; margin: auto; padding: 12px; box-sizing: border-box; }
        
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        
        h1 { text-align: center; font-size: 1.5rem; margin-bottom: 5px; }
        .role-indicator { text-align: center; font-size: 11px; font-weight: bold; text-transform: uppercase; color: var(--accent-blue); margin-bottom: 15px; }

        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 4px; opacity: 0.7; }
        input, select, button { 
            padding: 12px; margin: 6px 0 12px 0; width: 100%; border: 1px solid var(--border-color); 
            border-radius: 8px; background: var(--card-bg); color: var(--text-color); font-size: 16px; box-sizing: border-box; 
        }
        
        button { cursor: pointer; background: var(--accent-blue); color: #fff; border: none; font-weight: bold; }
        .btn-sync { background: var(--whatsapp-green) !important; }
        .btn-owner { background: #673ab7 !important; }

        .owner-only { display: none; border-top: 4px solid #673ab7; padding-top: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-color); text-align: left; font-size: 14px; }
        th { background: var(--bg-color); }
        
        .sync-badge { font-size: 10px; background: #eee; padding: 2px 5px; border-radius: 4px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>TRUE INVEST</h1>
    <div id="roleText" class="role-indicator">Employee Workspace</div>

    <div class="card">
        <label>Switch User Mode</label>
        <select id="roleSelect" onchange="handleRoleChange()">
            <option value="employee">Employee (Personal Entry)</option>
            <option value="owner">Owner (Master Admin)</option>
        </select>
        <input type="text" id="agentName" placeholder="Your Name (Employee Name)">
    </div>

    <div id="entryForm" class="card">
        <h3>New Lead Entry</h3>
        <input type="text" id="clientName" placeholder="Client Name">
        <input type="tel" id="clientPhone" placeholder="Phone Number">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <input type="text" id="location" placeholder="Location">
            <select id="status">
                <option>New</option>
                <option>Hot</option>
                <option>Follow-up</option>
                <option>Closed</option>
            </select>
        </div>
        <button onclick="saveToLocal()">Save to Phone</button>
        <button class="btn-sync" onclick="syncAllToCloud()">Sync Leads to Owner</button>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>My Local Leads</h3>
            <button style="width:auto; padding:5px 10px; font-size:12px;" onclick="clearLocal()">Clear All</button>
        </div>
        <div style="overflow-x:auto">
            <table>
                <thead><tr><th>Name</th><th>Status</th></tr></thead>
                <tbody id="localTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="ownerDashboard" class="owner-only card">
        <h3 style="color:#673ab7">Master Database (Cloud)</h3>
        <button class="btn-owner" onclick="loadCloudData()">Refresh from Google Sheets</button>
        <div style="overflow-x:auto; margin-top:15px;">
            <table>
                <thead><tr><th>Agent</th><th>Client</th><th>Status</th></tr></thead>
                <tbody id="cloudTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- SETTINGS ---
    const SCRIPT_URL = "YOUR_APPS_SCRIPT_URL_HERE"; 
    const OWNER_PIN = "1234"; 
    let localLeads = JSON.parse(localStorage.getItem('myLeads')) || [];

    // --- ROLE LOGIC ---
    function handleRoleChange() {
        const role = document.getElementById('roleSelect').value;
        if(role === 'owner') {
            const pass = prompt("Enter Admin PIN:");
            if(pass === OWNER_PIN) {
                document.getElementById('ownerDashboard').style.display = 'block';
                document.getElementById('entryForm').style.display = 'none';
                document.getElementById('roleText').innerText = "Owner Dashboard";
                loadCloudData();
            } else {
                alert("Incorrect PIN");
                document.getElementById('roleSelect').value = 'employee';
            }
        } else {
            document.getElementById('ownerDashboard').style.display = 'none';
            document.getElementById('entryForm').style.display = 'block';
            document.getElementById('roleText').innerText = "Employee Workspace";
        }
    }

    // --- LOCAL LOGIC ---
    function saveToLocal() {
        const agent = document.getElementById('agentName').value;
        const name = document.getElementById('clientName').value;
        const phone = document.getElementById('clientPhone').value;

        if(!agent || !name || !phone) return alert("Fill Agent Name, Client Name, and Phone");

        const lead = {
            employeeName: agent,
            name: name,
            phone: phone,
            location: document.getElementById('location').value,
            status: document.getElementById('status').value,
            followup: new Date().toLocaleDateString(),
            remark: "Local Entry"
        };

        localLeads.push(lead);
        localStorage.setItem('myLeads', JSON.stringify(localLeads));
        renderLocalTable();
        alert("Saved to device memory.");
    }

    function renderLocalTable() {
        const tbody = document.getElementById('localTableBody');
        tbody.innerHTML = localLeads.map(l => `<tr><td>${l.name}</td><td>${l.status}</td></tr>`).join('');
    }

    function clearLocal() {
        if(confirm("Delete local memory? (Does not delete Cloud data)")) {
            localLeads = [];
            localStorage.removeItem('myLeads');
            renderLocalTable();
        }
    }

    // --- CLOUD LOGIC ---
    async function syncAllToCloud() {
        if(localLeads.length === 0) return alert("No leads to sync.");
        const btn = event.target;
        btn.innerText = "Syncing...";
        
        try {
            // We sync the most recent lead added
            const lastLead = localLeads[localLeads.length - 1];
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(lastLead)
            });
            alert("Success: Lead sent to Owner's Master Sheet!");
        } catch (e) {
            alert("Sync Failed: Check Script URL or Internet.");
        } finally {
            btn.innerText = "Sync Leads to Owner";
        }
    }

    async function loadCloudData() {
        const tbody = document.getElementById('cloudTableBody');
        tbody.innerHTML = "Fetching...";
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            tbody.innerHTML = data.reverse().map(l => `<tr>
                <td><strong>${l.employeeName}</strong></td>
                <td>${l.name}<br><small>${l.phone}</small></td>
                <td>${l.status}</td>
            </tr>`).join('');
        } catch (e) {
            tbody.innerHTML = "Error loading cloud data.";
        }
    }

    // Initialize
    renderLocalTable();
</script>

</body>
</html>
