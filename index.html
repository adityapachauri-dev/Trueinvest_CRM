<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRUE INVEST CRM | Enterprise Elite</title>
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg-canvas: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --hot: #ef4444;
            --closed: #10b981;
            --wa-green: #25D366;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        .dark-mode {
            --bg-canvas: #020617;
            --card-bg: rgba(15, 23, 42, 0.85);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #1e293b;
        }

        /* Mobile & UI Reset */
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg-canvas); color: var(--text-main); 
            margin: 0; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding-bottom: calc(100px + var(--safe-bottom));
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 1200px; margin: auto; padding: 16px; }

        /* Elastic Entrance Animation */
        @keyframes springIn {
            0% { transform: scale(0.9) translateY(40px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        @keyframes shine { 0% { left: -100%; } 100% { left: 100%; } }

        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 28px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin-bottom: 20px;
            animation: springIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
        }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { 
            background: var(--card-bg); padding: 18px 10px; border-radius: 20px; text-align: center;
            border: 1px solid var(--border); animation: springIn 0.6s ease backwards;
        }
        .stat-card label { display: block; font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        .stat-card span { font-size: 24px; font-weight: 900; color: var(--primary); }

        /* Forms & Inputs */
        input, select, textarea { 
            width: 100%; padding: 14px 18px; border-radius: 16px; border: 2px solid var(--border);
            background: var(--bg-canvas); color: var(--text-main); font-size: 16px; transition: 0.3s ease;
        }
        input:focus { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 8px 20px var(--primary-glow); }
        label { display: block; font-size: 11px; font-weight: 700; margin: 10px 0 5px 5px; color: var(--text-muted); }

        .check-item { 
            display: flex; align-items: center; gap: 10px; background: var(--bg-canvas); 
            padding: 14px; border-radius: 16px; border: 2px solid var(--border); margin: 8px 0;
        }
        .check-item input { width: 22px; height: 22px; accent-color: var(--primary); }

        /* Buttons & Haptics */
        button { cursor: pointer; border: none; border-radius: 16px; font-weight: 700; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        button:active { transform: scale(0.92); opacity: 0.8; }
        .btn-primary { background: var(--primary); color: white; width: 100%; height: 56px; font-size: 16px; }
        .btn-danger { background: var(--hot) !important; color: white; }

        /* Table Design */
        .table-container { border-radius: 28px; overflow-x: auto; background: var(--card-bg); border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 1300px; }
        th, td { padding: 18px; border-bottom: 1px solid var(--border); text-align: left; }
        th { font-size: 11px; text-transform: uppercase; color: var(--text-muted); background: rgba(0,0,0,0.02); }
        
        .row-priority { background: rgba(239, 68, 68, 0.05) !important; border-left: 6px solid var(--hot); }
        .badge { padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 800; position: relative; overflow: hidden; display: inline-block; }
        .status-hot { background: #fee2e2; color: #ef4444; }
        .status-closed { background: #d1fae5; color: #10b981; }

        .action-group { display: flex; gap: 8px; }
        .action-group button { width: 42px; height: 42px; border-radius: 12px; }

        .fab { 
            position: fixed; bottom: calc(30px + var(--safe-bottom)); right: 25px; 
            width: 68px; height: 68px; background: var(--primary); color: white; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 32px; text-decoration: none; box-shadow: 0 15px 35px var(--primary-glow); z-index: 1000;
        }

        .notification-bar { background: var(--hot); color: white; padding: 18px; border-radius: 20px; text-align: center; font-weight: 800; margin-bottom: 25px; display: none; }
        .watermark { text-align: center; margin-top: 60px; opacity: 0.5; font-size: 11px; font-weight: 800; letter-spacing: 2px; }
        .watermark span { color: var(--primary); font-size: 18px; display: block; margin-top: 5px; }
        .hidden { display: none !important; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="loginView" class="container" style="margin-top: 80px;">
    <div class="glass-card" style="max-width: 420px; margin: auto;">
        <h1 style="text-align: center; font-weight: 900; letter-spacing: -2px; background: linear-gradient(to right, var(--primary), #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">TRUE INVEST</h1>
        <form id="loginForm">
            <label>Work Email</label>
            <input type="email" id="loginEmail" placeholder="email@trueinvest.com" required>
            <label>Security Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required>
            <button type="submit" id="loginBtn" class="btn-primary" style="margin-top: 25px;">AUTHORIZE & ENTRY</button>
            <div id="loginError" style="color:var(--hot); margin-top:15px; text-align:center; font-weight:700; display:none;"></div>
        </form>
    </div>
</div>

<div id="crmView" class="container hidden">
    <a href="#clientForm" class="fab" onclick="window.scrollTo({top:0, behavior:'smooth'})">＋</a>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h2 style="margin:0; font-weight:900;">TRUE INVEST CRM</h2>
        <button class="btn-danger" style="padding: 10px 18px; font-size: 11px; width:auto; border-radius:12px;" onclick="logout()">LOGOUT</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><label>Total</label><span id="statTotal">0</span></div>
        <div class="stat-card"><label>🔥 Hot</label><span id="statHot" style="color:var(--hot)">0</span></div>
        <div class="stat-card"><label>⏰ Today</label><span id="statFollow">0</span></div>
    </div>

    <div id="reminderAlert" class="notification-bar"></div>

    <div class="glass-card">
        <form id="clientForm">
            <input type="hidden" id="editId" value="">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div><label>Capture Date</label><input type="date" id="leadDate"></div>
                <div><label>Follow-up</label><input type="date" id="followup"></div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px;">
                <div><label>Name</label><input type="text" id="name" placeholder="Client Name" required></div>
                <div><label>Phone</label><input type="tel" id="phone" placeholder="91-xxxxxxxxxx" required></div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 10px;">
                <div><label>Locality</label><input type="text" id="location" placeholder="e.g. Crossing"></div>
                <div><label>Property Type</label><input type="text" id="propertyType" placeholder="e.g. 3BHK"></div>
                <div><label>Budget</label><input type="text" id="budget" placeholder="e.g. 1.80 Cr"></div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px;">
                <div><label>Status</label>
                    <select id="status">
                        <option>New</option><option>Follow-up</option><option>Hot</option>
                        <option>Closed</option><option>Not Interested</option><option>Follow-up Done</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px; align-items: flex-end;">
                    <div class="check-item" style="flex:1; margin:0"><input type="checkbox" id="visitDone"> <label style="margin:0">Visit</label></div>
                    <div class="check-item" style="flex:1; margin:0"><input type="checkbox" id="sendSunny"> <label style="margin:0">Sunny</label></div>
                </div>
            </div>

            <label>Intelligence Remarks</label>
            <textarea id="remark" placeholder="Meeting notes..." rows="3"></textarea>
            
            <div style="display: flex; gap: 12px; margin-top: 25px;">
                <button type="submit" id="saveBtn" class="btn-primary">SYNC TO CLOUD</button>
                <button type="button" class="btn-danger" style="width:120px; background:#64748b!important" onclick="resetForm()">RESET</button>
            </div>
        </form>
    </div>

    <div class="glass-card">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px;">
            <button class="btn-primary" style="background:#64748b; height:45px; font-size:12px;" onclick="toggleDarkMode()">UI Theme</button>
            <button class="btn-primary" style="background:#10b981; height:45px; font-size:12px;" onclick="downloadCSV()">Export CSV</button>
            <button class="btn-primary" style="background:#3b82f6; height:45px; font-size:12px;" onclick="document.getElementById('csvImport').click()">Import CSV</button>
            <input type="file" id="csvImport" accept=".csv" class="hidden" onchange="importCSV(event)">
            <button class="btn-primary" style="background:var(--hot); height:45px; font-size:11px;" onclick="clearDuplicates()">Cleanup</button>
        </div>
        <input type="text" id="search" placeholder="🔍 Search database..." style="border: 2px solid var(--primary);">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>S.No</th><th>Date</th><th>Name</th><th>Phone</th><th>Status</th><th>Budget</th><th>Assign</th><th>Visit</th><th>Loc</th><th>Type</th><th>Follow-up</th><th>Actions</th>
                </tr>
            </thead>
            <tbody id="clientTable"></tbody>
        </table>
    </div>

    <div class="watermark">SYSTEM DESIGNED BY<br><span>ADITYA PACHAURI</span></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsb9cwYp3LJWM7motWSK6UAy2ct7t-6zY", 
        authDomain: "truecrm-6cf8e.firebaseapp.com",
        projectId: "truecrm-6cf8e",
        storageBucket: "truecrm-6cf8e.firebasestorage.app",
        messagingSenderId: "791381407537",
        appId: "1:791381407537:web:45e9946a939f8d23b56210"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let clients = [];
    const getToday = () => new Date().toLocaleDateString('en-CA');

    // Theme Engine
    if (localStorage.getItem('crmTheme') === 'dark') document.body.classList.add('dark-mode');
    function toggleDarkMode() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('crmTheme', isDark ? 'dark' : 'light');
    }

    // Auth Controller
    auth.onAuthStateChanged(user => {
        if (user) { 
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('crmView').classList.remove('hidden');
            loadData(); 
        } else { 
            document.getElementById('loginView').classList.remove('hidden');
            document.getElementById('crmView').classList.add('hidden');
        }
    });

    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        btn.innerText = "AUTHENTICATING...";
        auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value)
            .catch(err => {
                btn.innerText = "AUTHORIZE ACCESS";
                document.getElementById('loginError').innerText = "Access Denied: " + err.message;
                document.getElementById('loginError').style.display = 'block';
            });
    });

    function logout() { auth.signOut(); }

    // Cloud Data Sync
    function loadData() {
        db.collection("leads").where("ownerId", "==", auth.currentUser.uid).orderBy("leadDate", "desc")
          .onSnapshot(snap => {
              clients = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
              renderTable();
              updateDashboard();
          });
    }

    function updateDashboard() {
        const today = getToday();
        const followCount = clients.filter(c => c.followup === today && c.status !== 'Closed' && c.status !== 'Follow-up Done').length;
        document.getElementById('statTotal').innerText = clients.length;
        document.getElementById('statHot').innerText = clients.filter(c => c.status === 'Hot').length;
        document.getElementById('statFollow').innerText = followCount;

        const bar = document.getElementById('reminderAlert');
        bar.style.display = followCount ? 'block' : 'none';
        bar.innerText = `🚨 ACTION: You have ${followCount} follow-ups required today!`;
    }

    document.getElementById('clientForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            ownerId: auth.currentUser.uid,
            leadDate: document.getElementById('leadDate').value || getToday(),
            followup: document.getElementById('followup').value || "",
            name: document.getElementById('name').value.trim(), 
            phone: document.getElementById('phone').value.trim(),
            location: document.getElementById('location').value || "", 
            propertyType: document.getElementById('propertyType').value || "",
            status: document.getElementById('status').value, 
            visitDone: document.getElementById('visitDone').checked,
            sentTo: document.getElementById('sendSunny').checked ? "Sunny" : "", 
            budget: document.getElementById('budget').value || "", 
            remark: document.getElementById('remark').value || ""
        };
        const id = document.getElementById('editId').value;
        const btn = document.getElementById('saveBtn');
        btn.innerText = 'SYNCING...';
        
        try {
            if (id) await db.collection("leads").doc(id).update(data);
            else await db.collection("leads").add(data);
            
            btn.style.background = 'var(--closed)';
            btn.innerText = '✓ CLOUD UPDATED';
            setTimeout(() => { resetForm(); btn.style.background = 'var(--primary)'; }, 1000);
        } catch (err) { alert(err.message); btn.innerText = 'SYNC TO CLOUD'; }
    });

    function renderTable() {
        const table = document.getElementById('clientTable');
        const today = getToday();
        table.innerHTML = '';
        let serial = 1;

        const sorted = [...clients].sort((a,b) => (a.followup === today ? -1 : 1));

        sorted.forEach(c => {
            const row = document.createElement('tr');
            if(c.followup === today && c.status !== 'Closed') row.className = 'row-priority';

            row.innerHTML = `
                <td style="opacity:0.4">#${serial++}</td>
                <td style="font-size:12px">${c.leadDate}</td>
                <td style="font-weight:800; color:var(--primary)">${c.name}</td>
                <td style="font-weight:700">${c.phone}</td>
                <td><span class="badge ${c.status === 'Hot' ? 'status-hot' : 'status-closed'}">${c.status}</span></td>
                <td style="color:#10b981; font-weight:bold">${c.budget || '-'}</td>
                <td>${c.sentTo || '-'}</td>
                <td>${c.visitDone ? '✅' : '❌'}</td>
                <td>${c.location || '-'}</td>
                <td>${c.propertyType || '-'}</td>
                <td style="font-weight:800; color:var(--primary)">${c.followup || '-'}</td>
                <td><div class="action-group">
                    <button style="background:#10b981; color:white" onclick='markDone("${c.id}")'>✓</button>
                    <button style="background:#3b82f6; color:white" onclick="window.location.href='tel:${c.phone}'">📞</button>
                    <button style="background:var(--wa-green); color:white" onclick='sendWA("${c.phone}", "${c.name}")'>WA</button>
                    <button style="background:#f59e0b; color:white" onclick="editLead('${c.id}')">✎</button>
                    <button class="btn-danger" onclick="deleteLead('${c.id}')">✕</button>
                </div></td>
            `;
            table.appendChild(row);
        });
    }

    function markDone(id) {
        db.collection("leads").doc(id).update({ status: "Follow-up Done", followup: "" });
    }

    function editLead(id) {
        const c = clients.find(x => x.id === id);
        document.getElementById('editId').value = c.id;
        ['leadDate', 'followup', 'name', 'phone', 'location', 'propertyType', 'status', 'budget', 'remark'].forEach(f => {
            document.getElementById(f).value = c[f] || '';
        });
        document.getElementById('visitDone').checked = !!c.visitDone;
        document.getElementById('sendSunny').checked = c.sentTo === "Sunny";
        document.getElementById('saveBtn').innerText = "UPDATE CLOUD RECORD";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function deleteLead(id) { 
        if(confirm("Confirm: Delete lead permanently?")) {
            db.collection("leads").doc(id).delete();
        }
    }

    async function clearDuplicates() {
        const seen = new Set();
        const toDelete = [];
        clients.forEach(c => {
            if(seen.has(c.phone.trim())) toDelete.push(c.id);
            else seen.add(c.phone.trim());
        });
        if(toDelete.length && confirm(`Remove ${toDelete.length} duplicates?`)) {
            const batch = db.batch();
            toDelete.forEach(id => batch.delete(db.collection("leads").doc(id)));
            await batch.commit();
        }
    }

    function resetForm() { 
        document.getElementById('clientForm').reset(); 
        document.getElementById('editId').value = ""; 
        document.getElementById('saveBtn').innerText = "SYNC TO CLOUD"; 
    }

    function sendWA(num, name) { 
        const clean = num.replace(/\D/g,'');
        const final = clean.length === 10 ? '91'+clean : clean;
        window.open(`https://wa.me/${final}?text=Hi ${name}, this is Aditya from True Invest...`, '_blank'); 
    }

    function downloadCSV() {
        let csv = "Date,Name,Phone,Status,Budget,Assign,Visit,Loc,Type,Followup\n";
        clients.forEach(c => { csv += `"${c.leadDate}","${c.name}","${c.phone}","${c.status}","${c.budget}","${c.sentTo}","${c.visitDone}","${c.location}","${c.propertyType}","${c.followup}"\n`; });
        const a = document.createElement('a'); a.href = window.URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        a.download = `Leads_Master.csv`; a.click();
    }

    function importCSV(e) {
        const reader = new FileReader();
        reader.onload = async (ev) => {
            const batch = db.batch();
            const rows = ev.target.result.split('\n').slice(1);
            rows.forEach(row => {
                const cols = row.split(',').map(c => c.replace(/"/g, '').trim());
                if(cols[1]) {
                    const newRef = db.collection("leads").doc();
                    batch.set(newRef, { 
                        ownerId: auth.currentUser.uid, leadDate: cols[0] || getToday(), name: cols[1], phone: cols[2], 
                        status: cols[3] || "New", budget: cols[4] || "", sentTo: cols[5] || "", 
                        visitDone: cols[6] === "true", location: cols[7] || "", propertyType: cols[8] || "", followup: cols[9] || "" 
                    });
                }
            });
            await batch.commit();
            alert("Sync Complete");
        };
        reader.readAsText(e.target.files[0]);
    }

    document.getElementById('search').addEventListener('input', e => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('#clientTable tr').forEach(tr => { 
            tr.style.display = tr.innerText.toLowerCase().includes(val) ? '' : 'none'; 
        });
    });
</script>
</body>
</html>
