<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUE INVEST CRM</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1877f2; margin-top: 0; }
        
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-blue { background: #1877f2; color: white; margin-bottom: 5px; }
        .btn-green { background: #25D366; color: white; width: auto; padding: 5px 10px; font-size: 12px; }
        .btn-red { background: #fa3e3e; color: white; width: auto; padding: 5px 10px; font-size: 12px; }
        .btn-grey { background: #606770; color: white; margin-top: 5px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f8f8f8; }
        .hidden { display: none; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="authView" class="container">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <button class="btn btn-blue" onclick="login()">Login</button>
</div>

<div id="appView" class="container hidden">
    <h2>True Invest CRM</h2>
    <button class="btn btn-grey" onclick="auth.signOut()" style="width:auto; float:right">Logout</button>
    <div style="clear:both"></div>

    <form id="leadForm">
        <input type="hidden" id="editId">
        <label>Client Name</label>
        <input type="text" id="name" required>
        <label>Phone Number</label>
        <input type="tel" id="phone" required>
        
        <div style="display:flex; gap:10px;">
            <div style="flex:1">
                <label>Status</label>
                <select id="status">
                    <option>New</option><option>Follow-up</option><option>Hot</option><option>Closed</option>
                </select>
            </div>
            <div style="flex:1">
                <label>Budget (Lacs)</label>
                <input type="text" id="budget">
            </div>
        </div>

        <label>Next Follow-up</label>
        <input type="date" id="followup">
        
        <label>Notes</label>
        <textarea id="remark" rows="2"></textarea>
        
        <button type="submit" class="btn btn-blue" id="saveBtn">Save Lead</button>
    </form>

    <input type="text" id="search" placeholder="Search leads..." style="margin-top:20px">
    
    <div style="overflow-x:auto">
        <table>
            <thead>
                <tr><th>Name</th><th>Phone</th><th>Status</th><th>Budget</th><th>Actions</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsb9cwYp3LJWM7motWSK6UAy2ct7t-6zY",
        authDomain: "truecrm-6cf8e.firebaseapp.com",
        projectId: "truecrm-6cf8e",
        storageBucket: "truecrm-6cf8e.firebasestorage.app",
        messagingSenderId: "791381407537",
        appId: "1:791381407537:web:45e9946a939f8d23b56210"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let leads = [];

    function login() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        auth.signInWithEmailAndPassword(e, p).catch(err => alert("Login Failed"));
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('authView').classList.add('hidden');
            document.getElementById('appView').classList.remove('hidden');
            fetchData();
        } else {
            document.getElementById('authView').classList.remove('hidden');
            document.getElementById('appView').classList.add('hidden');
        }
    });

    function fetchData() {
        const user = auth.currentUser;
        db.collection("leads").where("owner", "==", user.uid).onSnapshot(snap => {
            leads = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
            render();
        });
    }

    document.getElementById('leadForm').addEventListener('submit', e => {
        e.preventDefault();
        const user = auth.currentUser;
        const data = {
            owner: user.uid,
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            status: document.getElementById('status').value,
            budget: document.getElementById('budget').value,
            followup: document.getElementById('followup').value,
            remark: document.getElementById('remark').value,
            date: new Date().toISOString().split('T')[0]
        };
        const id = document.getElementById('editId').value;
        if(id) db.collection("leads").doc(id).update(data);
        else db.collection("leads").add(data);
        
        document.getElementById('leadForm').reset();
        document.getElementById('editId').value = "";
        document.getElementById('saveBtn').innerText = "Save Lead";
    });

    function render() {
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        leads.sort((a,b) => b.date.localeCompare(a.date)).forEach(l => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${l.name}</td>
                <td>${l.phone}</td>
                <td>${l.status}</td>
                <td>${l.budget}</td>
                <td>
                    <button class="btn-green" onclick="wa('${l.phone}', '${l.name}')">WA</button>
                    <button class="btn-blue" style="width:auto; font-size:12px; padding:5px" onclick="edit('${l.id}')">Edit</button>
                </td>
            `;
            body.appendChild(tr);
        });
    }

    function edit(id) {
        const l = leads.find(x => x.id === id);
        document.getElementById('editId').value = l.id;
        document.getElementById('name').value = l.name;
        document.getElementById('phone').value = l.phone;
        document.getElementById('status').value = l.status;
        document.getElementById('budget').value = l.budget;
        document.getElementById('followup').value = l.followup;
        document.getElementById('remark').value = l.remark;
        document.getElementById('saveBtn').innerText = "Update Lead";
    }

    function wa(n, name) { window.open(`https://wa.me/91${n.replace(/\D/g,'')}?text=Hello ${name}...`); }

    document.getElementById('search').addEventListener('input', e => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('tbody tr').forEach(tr => {
            tr.style.display = tr.innerText.toLowerCase().includes(val) ? '' : 'none';
        });
    });
</script>
</body>
</html>
