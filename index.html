<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRUE INVEST CRM - Pro</title>
    <style>
        /* Existing Styles Retained */
        :root {
            --bg-color: #f0f2f5; --card-bg: #ffffff; --text-color: #1c1e21; --border-color: #dddfe2;
            --accent-blue: #1877f2; --whatsapp-green: #25D366; --notify-red: #fa3e3e; --highlight-today: #fff9c4;
        }
        body.dark-mode {
            --bg-color: #18191a; --card-bg: #242526; --text-color: #e4e6eb; --border-color: #3e4042; --highlight-today: #4d4600;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding-bottom: 80px; transition: 0.3s; }
        .container { width: 100%; max-width: 600px; margin: auto; padding: 12px; box-sizing: border-box; }
        
        /* New: Login Simulation Header */
        .user-switcher { background: var(--accent-blue); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 0 0 15px 15px; margin-bottom: 15px; }
        .user-switcher select { width: auto; margin: 0; padding: 5px; height: auto; font-size: 14px; background: white; color: black; }

        h1 { text-align: center; font-size: 1.4rem; margin: 15px 0; }
        form, .table-container { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 4px; opacity: 0.7; }
        input, textarea, button, select { padding: 12px; margin: 6px 0 12px 0; width: 100%; border: 1px solid var(--border-color); border-radius: 8px; background: var(--card-bg); color: var(--text-color); font-size: 16px; box-sizing: border-box; }
        button { cursor: pointer; background: var(--accent-blue); color: #fff; border: none; font-weight: bold; border-radius: 10px; }
        .btn-wa { background: var(--whatsapp-green) !important; width: 45px !important; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 10px; border-bottom: 1px solid var(--border-color); text-align: center; font-size: 13px; }
        .row-highlight { background-color: var(--highlight-today) !important; }
        .section-divider { background: #606770 !important; color: white; font-size: 11px; text-align: left; padding: 8px 15px; }
        .fab { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--accent-blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 100; text-decoration: none; }
    </style>
</head>
<body>

<div class="user-switcher">
    <span>Logged in as:</span>
    <select id="currentUserRole" onchange="switchUser()">
        <option value="admin">Aditya (Admin)</option>
        <option value="staff">Sunny (Staff)</option>
    </select>
</div>

<div class="container">
    <a href="#clientForm" class="fab">+</a>
    <h1>TRUE INVEST CRM</h1>
    <div id="reminderAlert" class="notification-bar"></div>

    <form id="clientForm">
        <input type="hidden" id="editIndex" value="">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>Lead Date</label><input type="date" id="leadDate"></div>
            <div><label>Follow-up</label><input type="date" id="followup"></div>
        </div>
        <input type="text" id="name" placeholder="Client Name" required>
        <input type="tel" id="phone" placeholder="Phone Number" required>
        
        <label>Status</label>
        <select id="status">
            <option>New</option>
            <option>Follow-up</option>
            <option>Hot</option>
            <option>Closed</option>
            <option>Not Interested</option>
        </select>

        <label>Assign Lead To</label>
        <select id="assignedTo">
            <option value="admin">Me (Aditya)</option>
            <option value="staff">Sunny</option>
        </select>

        <textarea id="remark" placeholder="Remarks"></textarea>
        <button type="submit" id="saveBtn">Save Record</button>
    </form>

    <div class="controls">
        <input type="text" id="search" placeholder="Search leads..." style="grid-column: span 2;">
        <button onclick="toggleDarkMode()">Theme</button>
        <button style="background:#dc3545" onclick="clearAllData()">Clear All</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Name</th><th>Phone</th><th>Status</th><th>Assigned To</th><th>Follow-up</th><th>Actions</th>
                </tr>
            </thead>
            <tbody id="clientTable"></tbody>
        </table>
    </div>
</div>

<script>
    // 2. CORE LOGIC & FILTERING
    let clients = JSON.parse(localStorage.getItem('clients')) || [];
    let currentUser = "admin"; // Default login

    function switchUser() {
        currentUser = document.getElementById('currentUserRole').value;
        renderTable(); // Refresh table based on who is logged in
    }

    function renderTable() {
        const table = document.getElementById('clientTable');
        table.innerHTML = '';
        
        // --- THE SECURITY FILTER ---
        // If current user is 'staff', filter the list to only show leads assigned to them.
        // If 'admin', show everything.
        const visibleLeads = clients.filter(c => {
            if (currentUser === "admin") return true; 
            return c.assignedTo === "staff"; 
        });

        visibleLeads.forEach((c, index) => {
            const originalIdx = clients.indexOf(c);
            const row = document.createElement('tr');
            if(c.followup === new Date().toISOString().split('T')[0]) row.className = 'row-highlight';

            row.innerHTML = `
                <td>${c.name}</td>
                <td>${c.phone}</td>
                <td style="font-weight:bold">${c.status}</td>
                <td>${c.assignedTo === 'staff' ? 'Sunny' : 'Aditya'}</td>
                <td>${c.followup || '-'}</td>
                <td style="display:flex; gap:5px">
                    <button class="btn-wa" onclick="sendWA('${c.phone}', '${c.name}')">WA</button>
                    <button onclick="editClient(${originalIdx})" style="background:#ffc107; color:black; padding:5px">Edit</button>
                </td>
            `;
            table.appendChild(row);
        });
    }

    // --- FORM HANDLING ---
    document.getElementById('clientForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const data = {
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            leadDate: document.getElementById('leadDate').value,
            followup: document.getElementById('followup').value,
            status: document.getElementById('status').value,
            assignedTo: document.getElementById('assignedTo').value,
            remark: document.getElementById('remark').value
        };

        const editIdx = document.getElementById('editIndex').value;
        if(editIdx === "") clients.push(data);
        else clients[parseInt(editIdx)] = data;

        localStorage.setItem('clients', JSON.stringify(clients));
        this.reset();
        document.getElementById('editIndex').value = "";
        renderTable();
    });

    function editClient(idx) {
        const c = clients[idx];
        document.getElementById('editIndex').value = idx;
        document.getElementById('name').value = c.name;
        document.getElementById('phone').value = c.phone;
        document.getElementById('status').value = c.status;
        document.getElementById('assignedTo').value = c.assignedTo;
        document.getElementById('followup').value = c.followup;
        window.scrollTo(0,0);
    }

    function sendWA(num, name) {
        window.open(`https://wa.me/${num.replace(/\D/g,'')}?text=Hello ${name}, following up from True Invest regarding your enquiry.`, '_blank');
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    function clearAllData() { if(confirm("Delete all?")) { localStorage.clear(); location.reload(); } }

    // Initial Load
    renderTable();
</script>
</body>
</html>
